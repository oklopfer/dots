}

print_info() {
    info title
    prin "${c4}в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ${NC}"
    info " вҖӢ вҖӢ $(distro_icon) " distro
    info " вҖӢ вҖӢ $(kernel_icon) " kernel
    info " вҖӢ вҖӢ $(model_icon) " model
    info " вҖӢ вҖӢ у°Қӣ " arch
    info " вҖӢ вҖӢ оүҰ " cpu
    info " вҖӢ вҖӢ у°ў® " gpu
    info " вҖӢ вҖӢ у°‘ӯ " memory
    info " вҖӢ вҖӢ пӮ  " disk
#    info " вҖӢ вҖӢ  пӮ… " gpu_driver  # Linux/macOS only
#    info " вҖӢ вҖӢ пӮ… " cpu_usage
#    info " вҖӢ вҖӢ у°Ӯ„ " battery
    prin "${c4}в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө${NC}"
#    info " вҖӢ вҖӢ пҖҮ " users
    info " вҖӢ вҖӢ у°Ҹ— " packages
    info " вҖӢ вҖӢ п„  " shell
    info " вҖӢ вҖӢ п’ү " term
    info " вҖӢ вҖӢ пҖұ " term_font
#    info " вҖӢ вҖӢ в”Ӯ пҖұ " font
    info " вҖӢ вҖӢ оҲј " de
    info " вҖӢ вҖӢ п’Ҳ " wm
    info " вҖӢ вҖӢ  у°үј " theme
    info " вҖӢ вҖӢ  у°Җ» " icons
    info " вҖӢ вҖӢ у°Қ№ " resolution
    info " вҖӢ вҖӢ  у°…җ " uptime
#    info " вҖӢ вҖӢ у°қҡ " song
    # [[ "$player" ]] && prin "Music Player" "$player"
#    info " вҖӢ вҖӢ  пҮ« " local_ip
#    info " вҖӢ вҖӢ  пҮ« " public_ip
#    info " вҖӢ вҖӢ  п‘җ " locale  # This only works on glibc systems.
    info cols
    prin "${c4}в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө${NC}"
    prin "\n \n \n \n \n \n ${BLACK}в–Ҳв–Ҳ \n ${RED}в–Ҳв–Ҳ \n ${GREEN}в–Ҳв–Ҳ \n ${YELLOW}в–Ҳв–Ҳ \n ${BLUE}в–Ҳв–Ҳ \n ${PURPLE}в–Ҳв–Ҳ \n ${CYAN}в–Ҳв–Ҳ \n ${WHITE}в–Ҳв–Ҳ"
    prin "\n \n \n \n \n \n ${IBlack}в–Ҳв–Ҳ \n ${IRed}в–Ҳв–Ҳ \n ${IGreen}в–Ҳв–Ҳ \n ${IYellow}в–Ҳв–Ҳ \n ${IBlue}в–Ҳв–Ҳ \n ${IPurple}в–Ҳв–Ҳ \n ${ICyan}в–Ҳв–Ҳ \n ${IWhite}в–Ҳв–Ҳ"
    prin "${c4}в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ${NC}"
}

