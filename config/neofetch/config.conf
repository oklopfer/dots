distro_icon() {
    local neouname neouname_o distcon
    neouname="$(uname)"
    [[ $neouname == Linux ]] && neouname_o="$(uname -o 2>/dev/null)"
    if [[ $neouname == Linux && $neouname_o == Android ]]; then
        distcon="п…»"
    else
      case ${neouname} in
        SunOS)                       distcon="пҶ…";;
        Darwin)                      distcon="п…№";;
        CYGWIN*|MSYS*|MINGW*)        distcon="оңҸ";;
        FreeBSD|OpenBSD|DragonFly)   distcon="пҢҢ";;
        Linux)
          local os_release_id
          if [[ -r /etc/os-release ]]; then
            os_release_id=$(awk -F= '/^ID=/{print $2}' /etc/os-release)
          elif [[ -e /etc/artix-release ]]; then
            os_release_id=artix
          fi
          case $os_release_id in
            *arch*)                  distcon="пҢғ";;
            *raspbian*|*debian*)     distcon="пҢҶ";;
            *ubuntu*|*rhino*)        distcon="пҢӣ";;
            *elementary*)            distcon="пҢү";;
            *linuxmint*)             distcon="у°Јӯ";;
            *fedora*)                distcon="пҢҠ";;
            *coreos*)                distcon="пҢ…";;
            *kali*)                  distcon="пҢ§";;
            *gentoo*)                distcon="пҢҚ";;
            *mageia*)                distcon="пҢҗ";;
            *centos*)                distcon="пҢ„";;
            *opensuse*|*tumbleweed*) distcon="пҢ”";;
            *sabayon*)               distcon="пҢ—";;
            *slackware*)             distcon="пҢҷ";;
            *linuxmint*)             distcon="пҢҺ";;
            *alpine*)                distcon="пҢҖ";;
            *aosc*)                  distcon="пҢҒ";;
            *nixos*)                 distcon="пҢ“";;
            *devuan*)                distcon="пҢҮ";;
            *manjaro*)               distcon="пҢ’";;
            *void*)                  distcon="пҢ®";;
            *artix*)                 distcon="пҢҹ";;
            *rhel*)                  distcon="уұ„ӣ";;
            amzn)                    distcon="пү°";;
            endeavouros)             distcon="пҢў";;
            rocky)                   distcon="пҢ«";;
            guix)                    distcon="пҢҘ";;
            *)                       distcon="п…ј";;
          esac
          ;;
      esac
    fi
    echo -e "${distcon}"
}

model_icon() {
    local modcon
    if [[ "$(awk -F '\\s*: | @' '/model name|Hardware|Processor|^cpu model|chip type|^cpu type/ {cpu=$2; if ($1 == "Hardware") exit } END { print cpu }' "/proc/cpuinfo")" == "BCM2835" ]]; then
        modcon="пҢ•"
    else
        modcon="у°Ңў"
    fi
    echo -e "${modcon}"
}

kernel_icon() {
    local kercon
    if [[ -f /.dockerenv ]]; then
        kercon="у°ЎЁ"
    elif [[ $(uname) == "Darwin" ]]; then
        kercon="у°Җ¶"
    else
        kercon="оң’"
    fi
    echo -e "${kercon}"
}

